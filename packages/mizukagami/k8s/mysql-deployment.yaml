apiVersion: apps/v1
kind: Deployment
metadata:
  name: mizukagami-mysql
  namespace: mizukagami
  labels:
    app.kubernetes.io/name: mizukagami-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mizukagami-mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mizukagami-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - name: mysql
              containerPort: 3306
          envFrom:
            - secretRef:
                name: mizukagami-mysql
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD"
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mizukagami-mysql
