apiVersion: apps/v1
kind: Deployment
metadata:
  name: mizukagami
  namespace: mizukagami
  labels:
    app.kubernetes.io/name: mizukagami
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mizukagami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mizukagami
    spec:
      securityContext:
        fsGroup: 65532
      containers:
        - name: mizukagami
          image: mizukagami:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: MIZUKAGAMI_ADDR
              value: ":3000"
            - name: MIZUKAGAMI_LOG_DIR
              value: /var/lib/mizukagami/tessera
            - name: MIZUKAGAMI_SIGNER_KEY_FILE
              value: /var/lib/mizukagami/tessera/.state/signer.key
          volumeMounts:
            - name: data
              mountPath: /var/lib/mizukagami
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mizukagami-data
