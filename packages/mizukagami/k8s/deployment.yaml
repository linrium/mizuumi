apiVersion: apps/v1
kind: Deployment
metadata:
  name: mizukagami
  namespace: mizukagami
  labels:
    app.kubernetes.io/name: mizukagami
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mizukagami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mizukagami
    spec:
      securityContext:
        fsGroup: 65532
      initContainers:
        - name: create-rustfs-bucket
          image: rustfs/rc:v0.1.28
          env:
            - name: RUSTFS_ENDPOINT
              value: http://rustfs-svc.mizukura.svc.cluster.local:9000
            - name: RUSTFS_BUCKET
              value: mizukagami
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-auth
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-auth
                  key: RUSTFS_SECRET_KEY
          command:
            - /bin/sh
            - -ec
            - |
              until rc alias set --bucket-lookup path rustfs "$RUSTFS_ENDPOINT" "$RUSTFS_ACCESS_KEY" "$RUSTFS_SECRET_KEY"; do
                sleep 2
              done
              rc bucket create --ignore-existing "rustfs/$RUSTFS_BUCKET"
      containers:
        - name: mizukagami
          image: mizukagami:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: MIZUKAGAMI_ADDR
              value: ":3000"
            - name: MIZUKAGAMI_LOG_DIR
              value: /var/lib/mizukagami/tessera
            - name: MIZUKAGAMI_SIGNER_KEY_FILE
              value: /var/lib/mizukagami/tessera/.state/signer.key
            - name: MIZUKAGAMI_STORAGE_BACKEND
              value: aws-s3
            - name: MIZUKAGAMI_AWS_S3_ENDPOINT
              value: http://rustfs-svc.mizukura.svc.cluster.local:9000
            - name: MIZUKAGAMI_AWS_S3_BUCKET
              value: mizukagami
            - name: MIZUKAGAMI_AWS_S3_REGION
              value: us-east-1
            - name: MIZUKAGAMI_AWS_S3_USE_PATH_STYLE
              value: "true"
            - name: MIZUKAGAMI_AWS_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-auth
                  key: RUSTFS_ACCESS_KEY
            - name: MIZUKAGAMI_AWS_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-auth
                  key: RUSTFS_SECRET_KEY
            - name: MIZUKAGAMI_AWS_MYSQL_HOST
              value: mysql.mizukagami.svc.cluster.local
            - name: MIZUKAGAMI_AWS_MYSQL_PORT
              value: "3306"
            - name: MIZUKAGAMI_AWS_MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mizukagami-mysql
                  key: MYSQL_DATABASE
            - name: MIZUKAGAMI_AWS_MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mizukagami-mysql
                  key: MYSQL_USER
            - name: MIZUKAGAMI_AWS_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mizukagami-mysql
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mizukagami
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mizukagami-data
