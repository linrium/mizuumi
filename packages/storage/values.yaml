# RustFS Helm values for a one-node Kubernetes deployment.
#
# RustFS distributed mode requires at least two nodes for erasure coding, so
# this package uses standalone mode: one pod, one PVC, one Kubernetes node.
replicaCount: 1
drivesPerNode: 1

mode:
  standalone:
    enabled: true
  distributed:
    enabled: false

secret:
  existingSecret: rustfs-auth

ingress:
  enabled: false

service:
  type: ClusterIP
  endpoint:
    port: 9000
  console:
    port: 9001

storageclass:
  name: standard
  dataStorageSize: 10Gi
  logStorageSize: 1Gi

pdb:
  create: false

affinity:
  podAntiAffinity:
    enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
